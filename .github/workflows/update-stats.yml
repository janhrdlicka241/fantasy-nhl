
name: Update NHL Stats

on:
  schedule:
    - cron: '0 7 * * *'  # každý den v 7:00 ráno
  workflow_dispatch:       # možnost spustit ručně

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch NHL stats
        run: python fetch_stats.py

      - name: Commit and push stats
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add stats.json
          git diff --staged --quiet || git commit -m "Update NHL stats $(date '+%Y-%m-%d %H:%M')"
          git push
